name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:coverage -- --coverage.reporter=text
      - run: npm run build
      - run: node dist/index.js ci --baseline-ref origin/main
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm audit --audit-level=moderate
      - run: npm pack --dry-run
